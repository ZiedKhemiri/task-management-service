spring.application.name=task-management-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/taskdb
spring.datasource.username=taskuser
spring.datasource.password=taskpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Same Keycloak realm used by the auth service (task-management-service only verifies tokens, it does not issue them)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/workforce-os
